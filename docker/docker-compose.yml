version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: wall-art-postgres
    environment:
      POSTGRES_USER: wallart
      POSTGRES_PASSWORD: wallart_dev_password
      POSTGRES_DB: wall_art
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallart"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: wall-art-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Frontend (Next.js)
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: wall-art-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:4000
      - NEXT_PUBLIC_ML_URL=http://localhost:8000
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=dev-secret-change-in-production
    depends_on:
      - backend
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next

  # Backend (Node.js + Express)
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: wall-art-backend
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://wallart:wallart_dev_password@postgres:5432/wall_art
      - REDIS_URL=redis://redis:6379
      - ML_SERVICE_URL=http://ml-service:8000
      - JWT_SECRET=dev-jwt-secret-change-in-production
      - NODE_ENV=development
      - PORT=4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - /app/node_modules

  # ML Service (Python FastAPI)
  ml-service:
    build:
      context: ../ml-service
      dockerfile: ../docker/Dockerfile.ml
    container_name: wall-art-ml
    ports:
      - "8000:8000"
    environment:
      - DEVICE=cpu
      - MODEL_CACHE_DIR=/models
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../ml-service:/app
      - ml_models:/models
    deploy:
      resources:
        limits:
          memory: 8G

volumes:
  postgres_data:
  redis_data:
  ml_models:
