version: '3.8'

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      target: production
    container_name: wall-art-frontend-prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.artvision.app
      - NEXT_PUBLIC_SOCKET_URL=https://api.artvision.app
      - NEXT_PUBLIC_ML_URL=https://api.artvision.app/ml
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
      target: production
    container_name: wall-art-backend-prod
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ML_SERVICE_URL=http://ml-service:8000
      - JWT_SECRET=${JWT_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
    restart: always
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  ml-service:
    build:
      context: ../ml-service
      dockerfile: ../docker/Dockerfile.ml
      target: production
    container_name: wall-art-ml-prod
    ports:
      - "8000:8000"
    environment:
      - DEVICE=cuda
      - MODEL_CACHE_DIR=/models
      - REDIS_URL=${REDIS_URL}
    volumes:
      - ml_models_prod:/models
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 16G
          cpus: '4.0'
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  ml_models_prod:
