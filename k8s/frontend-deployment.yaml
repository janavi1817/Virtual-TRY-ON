apiVersion: apps/v1
kind: Deployment
metadata:
  name: wall-art-frontend
  labels:
    app: wall-art-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wall-art-frontend
  template:
    metadata:
      labels:
        app: wall-art-frontend
    spec:
      containers:
        - name: frontend
          image: wall-art-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: wall-art-config
                  key: api-url
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: wall-art-secrets
                  key: nextauth-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: wall-art-frontend-svc
spec:
  selector:
    app: wall-art-frontend
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
