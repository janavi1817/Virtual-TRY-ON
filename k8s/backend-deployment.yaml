apiVersion: apps/v1
kind: Deployment
metadata:
  name: wall-art-backend
  labels:
    app: wall-art-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: wall-art-backend
  template:
    metadata:
      labels:
        app: wall-art-backend
    spec:
      containers:
        - name: backend
          image: wall-art-backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: wall-art-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: wall-art-config
                  key: redis-url
            - name: ML_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: wall-art-config
                  key: ml-service-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: wall-art-secrets
                  key: jwt-secret
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: wall-art-backend-svc
spec:
  selector:
    app: wall-art-backend
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP
